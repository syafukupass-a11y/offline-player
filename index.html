<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080b12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Offline Player">
  <meta name="description" content="動画を端末内に保存して、オフラインで再生できるプレイヤー">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="styles.css">
  <title>Offline Player</title>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true">▶</div>
        <div><strong>Offline</strong><span>Player</span></div>
        <button class="icon-button mobile-close" id="closeSidebar" aria-label="メニューを閉じる">×</button>
      </div>

      <button class="primary-button import-trigger" id="importButton">
        <span>＋</span> 動画を追加
      </button>
      <input id="fileInput" type="file" accept="video/*" multiple hidden>

      <nav class="nav-list" aria-label="ライブラリ">
        <button class="nav-item active" data-view="library"><span>▦</span>すべての動画 <b id="allCount">0</b></button>
        <button class="nav-item" data-view="recent"><span>◷</span>最近追加</button>
        <button class="nav-item" data-view="favorites"><span>♡</span>お気に入り</button>
      </nav>

      <div class="playlist-heading">
        <span>プレイリスト</span>
        <button class="icon-button" id="newPlaylistButton" aria-label="プレイリストを追加">＋</button>
      </div>
      <div class="playlist-list" id="playlistList"></div>

      <div class="storage-card">
        <div><span>端末ストレージ</span><b id="storageText">計算中…</b></div>
        <div class="storage-track"><i id="storageBar"></i></div>
        <small>動画はこの端末内だけに保存されます</small>
      </div>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <button class="icon-button menu-button" id="openSidebar" aria-label="メニューを開く">☰</button>
        <label class="search-box">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="動画を検索" autocomplete="off">
        </label>
        <button class="icon-button" id="installButton" aria-label="アプリをインストール" title="アプリをインストール" hidden>⇩</button>
      </header>

      <section class="content-head">
        <div>
          <p class="eyebrow" id="viewEyebrow">MY LIBRARY</p>
          <h1 id="viewTitle">すべての動画</h1>
          <p id="viewSubtitle">端末に保存した動画をオフラインで楽しめます</p>
        </div>
        <div class="view-actions">
          <button class="secondary-button" id="playAllButton">▶ すべて再生</button>
          <select id="sortSelect" aria-label="並び順">
            <option value="newest">新しい順</option>
            <option value="oldest">古い順</option>
            <option value="name">名前順</option>
            <option value="duration">長い順</option>
          </select>
        </div>
      </section>

      <section class="video-grid" id="videoGrid" aria-live="polite"></section>

      <section class="empty-state" id="emptyState" hidden>
        <div class="empty-icon">▶</div>
        <h2 id="emptyTitle">動画を追加しましょう</h2>
        <p id="emptyMessage">端末の動画を選ぶと、通信なしでも再生できます。</p>
        <button class="primary-button" id="emptyImportButton">動画を選択</button>
      </section>
    </main>
  </div>

  <section class="player-dock" id="playerDock" hidden>
    <div class="now-playing">
      <div class="mini-thumb"><span>▶</span></div>
      <div><strong id="nowTitle">動画タイトル</strong><span id="nowMeta">オフライン</span></div>
    </div>
    <div class="player-center">
      <div class="player-controls">
        <button class="dock-button" id="shuffleButton" aria-label="シャッフル">⌘</button>
        <button class="dock-button" id="previousButton" aria-label="前の動画">◀◀</button>
        <button class="play-button" id="dockPlayButton" aria-label="再生">▶</button>
        <button class="dock-button" id="nextButton" aria-label="次の動画">▶▶</button>
        <button class="dock-button" id="repeatButton" aria-label="リピート">↻</button>
      </div>
      <div class="progress-row">
        <span id="currentTime">0:00</span>
        <input id="seekBar" type="range" min="0" max="100" value="0" aria-label="再生位置">
        <span id="durationText">0:00</span>
      </div>
    </div>
    <div class="volume-controls">
      <span>◖</span><input id="volumeBar" type="range" min="0" max="1" step="0.01" value="1" aria-label="音量">
      <button class="icon-button" id="expandPlayer" aria-label="プレイヤーを開く">↗</button>
    </div>
  </section>

  <dialog class="player-modal" id="playerModal">
    <div class="modal-head">
      <div><p>NOW PLAYING</p><h2 id="modalTitle">動画タイトル</h2></div>
      <button class="icon-button" id="closePlayer" aria-label="閉じる">×</button>
    </div>
    <video id="videoPlayer" controls playsinline preload="metadata"></video>
  </dialog>

  <dialog class="form-dialog" id="playlistDialog">
    <form method="dialog" id="playlistForm">
      <h2>新しいプレイリスト</h2>
      <p>動画をまとめるプレイリストを作成します。</p>
      <label>プレイリスト名<input id="playlistName" maxlength="40" placeholder="例：お気に入りの映画" required></label>
      <div class="dialog-actions"><button value="cancel" class="secondary-button">キャンセル</button><button value="default" class="primary-button" id="savePlaylist">作成</button></div>
    </form>
  </dialog>

  <dialog class="form-dialog" id="addToDialog">
    <form method="dialog" id="addToForm">
      <h2>プレイリストに追加</h2>
      <p id="addToVideoName"></p>
      <div class="check-list" id="playlistChecks"></div>
      <div class="dialog-actions"><button value="cancel" class="secondary-button">閉じる</button><button value="default" class="primary-button" id="applyPlaylists">保存</button></div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status"></div>
  <script type="module" src="app.js"></script>
</body>
</html>
